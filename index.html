<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Daily Sin</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #111111; --green: #2D6A2D; --green-bright: #3d8f3d;
    --white: #ffffff; --font: 'Permanent Marker', cursive;
  }
  html, body {
    height: 100%; background: var(--bg); font-family: var(--font);
    color: var(--white); overflow: hidden; touch-action: manipulation; user-select: none;
  }
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; opacity: 0.045;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px; z-index: 9999;
  }

  /* FLOATING WORDS */
  #float-layer { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .float-word {
    position: absolute; font-family: var(--font); color: rgba(45,106,45,0.11);
    white-space: nowrap; animation: floatDrift linear infinite;
  }
  @keyframes floatDrift {
    0%   { transform: translateY(110vh) rotate(-6deg); opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 1; }
    100% { transform: translateY(-20vh) rotate(6deg); opacity: 0; }
  }

  /* SCREENS */
  .screen {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 10;
  }
  .screen.active { opacity: 1; pointer-events: all; }

  /* MUSIC BTN */
  #music-btn {
    position: fixed; top: 14px; right: 14px; z-index: 1000;
    background: transparent; border: 1px solid rgba(45,106,45,0.45);
    color: rgba(255,255,255,0.4); font-family: var(--font); font-size: 12px;
    padding: 6px 12px; border-radius: 4px; cursor: pointer; letter-spacing: 1px;
    transition: color 0.2s, border-color 0.2s;
  }
  #music-btn.on { color: var(--green-bright); border-color: var(--green-bright); }

  /* INTRO */
  #intro-screen { gap: 32px; padding: 24px; text-align: center; }
  .intro-title {
    font-size: clamp(36px, 10vw, 56px); line-height: 1.1;
    color: var(--green-bright); text-shadow: 0 0 40px rgba(45,106,45,0.5);
  }
  .intro-sub {
    font-size: clamp(16px, 4.5vw, 22px); color: rgba(255,255,255,0.6);
    line-height: 1.5; max-width: 320px;
  }
  .start-btn {
    background: var(--green); color: var(--white); border: none;
    padding: 18px 48px; font-family: var(--font); font-size: clamp(22px, 6vw, 30px);
    border-radius: 4px; cursor: pointer; letter-spacing: 1px;
    transition: transform 0.1s; box-shadow: 0 0 30px rgba(45,106,45,0.3);
  }
  .start-btn:active { transform: scale(0.96); }

  /* GAME */
  #game-screen { padding: 0; justify-content: space-between; }
  .top-bar {
    width: 100%; padding: 20px 24px 12px;
    display: flex; align-items: center; justify-content: flex-end;
  }
  .pool-badge { font-size: 12px; color: var(--green); letter-spacing: 2px; text-transform: uppercase; }

  .q-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 24px; text-align: center; position: relative;
  }
  .q-text {
    font-size: clamp(24px, 7vw, 40px); line-height: 1.25;
    color: var(--white); max-width: 340px; position: relative; z-index: 2; word-break: keep-all; overflow-wrap: break-word;
  }
  .q-text .float-char {
    display: inline-block;
    animation: charFloat ease-in-out infinite alternate;
  }
  @keyframes charFloat {
    0%   { transform: translate(0, 0); }
    100% { transform: translate(var(--cx), var(--cy)); }
  }
  .product-tag {
    display: block; font-size: 11px; color: var(--green-bright);
    letter-spacing: 3px; margin-bottom: 12px; opacity: 0.8;
  }
  .q-doodle {
    position: absolute; opacity: 0.11; pointer-events: none;
    animation: doodleFloat 4s ease-in-out infinite alternate;
  }
  @keyframes doodleFloat {
    0%   { transform: translateY(0) rotate(-2deg); }
    100% { transform: translateY(-8px) rotate(2deg); }
  }

  .choices {
    width: 100%; display: grid; grid-template-columns: 1fr 1fr;
    border-top: 1px solid rgba(45,106,45,0.2);
  }
  .choice-btn {
    background: transparent; border: none; color: var(--white);
    font-family: var(--font); font-size: clamp(20px, 5.5vw, 30px);
    padding: 28px 20px; cursor: pointer; text-align: center;
    line-height: 1.2; transition: background 0.15s;
  }
  .choice-btn:first-child { border-right: 1px solid rgba(45,106,45,0.2); }
  .choice-btn:active { background: rgba(45,106,45,0.15); }

  .progress-dots {
    display: flex; gap: 6px; padding: 0 24px 16px; align-items: center; flex-wrap: wrap;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.15); transition: background 0.3s, transform 0.3s; flex-shrink: 0;
  }
  .dot.done { background: var(--green); }
  .dot.current { background: var(--white); transform: scale(1.4); }
  .dot.product { background: var(--green); border: 1px solid var(--green-bright); }

  /* CONSEQUENCE */
  #consequence-screen { background: #000; }
  .consequence-text {
    font-size: clamp(22px, 6vw, 32px); color: var(--green-bright);
    text-align: center; padding: 24px; line-height: 1.4;
  }

  /* COUNTER */
  #counter-screen { gap: 24px; padding: 32px; text-align: center; }
  .you-chose { font-size: clamp(14px, 3.5vw, 18px); color: rgba(255,255,255,0.4); letter-spacing: 2px; text-transform: uppercase; }
  .chosen-label {
    font-size: clamp(28px, 8vw, 44px); color: var(--green-bright);
    line-height: 1.1; text-shadow: 0 0 30px rgba(45,106,45,0.5);
  }
  .pct-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .pct-number {
    font-size: clamp(64px, 18vw, 100px); color: var(--white); line-height: 1;
    opacity: 0; transform: scale(0.6);
    transition: opacity 0.4s, transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  .pct-number.revealed { opacity: 1; transform: scale(1); }
  .pct-label { font-size: clamp(14px, 3.5vw, 18px); color: rgba(255,255,255,0.4); letter-spacing: 1px; }
  .next-btn {
    background: var(--green); color: var(--white); border: none;
    padding: 16px 44px; font-family: var(--font); font-size: clamp(20px, 5vw, 26px);
    border-radius: 4px; cursor: pointer; opacity: 0; transform: translateY(12px);
    transition: opacity 0.3s 0.6s, transform 0.3s 0.6s, background 0.15s;
  }
  .next-btn.visible { opacity: 1; transform: translateY(0); }
  .next-btn:active { background: var(--green-bright); transform: scale(0.97); }

  /* LEAD */
  #lead-screen { gap: 28px; padding: 32px; text-align: center; }
  .lead-title { font-size: clamp(26px, 7vw, 38px); color: var(--white); line-height: 1.3; }
  .lead-sub { font-size: clamp(14px, 3.5vw, 18px); color: rgba(255,255,255,0.4); }
  .lead-form { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 300px; }
  .lead-input {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(45,106,45,0.4);
    color: var(--white); font-family: var(--font); font-size: clamp(16px, 4vw, 20px);
    padding: 14px 16px; border-radius: 4px; outline: none; transition: border-color 0.2s;
  }
  .lead-input::placeholder { color: rgba(255,255,255,0.25); }
  .lead-input:focus { border-color: var(--green-bright); }
  .consent-wrap { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; text-align: left; }
  .consent-wrap input[type="checkbox"] {
    margin-top: 3px; width: 18px; height: 18px; min-width: 18px;
    accent-color: var(--green-bright); cursor: pointer;
  }
  .consent-text {
    font-size: clamp(11px, 2.8vw, 13px); color: rgba(255,255,255,0.35);
    line-height: 1.5; font-family: var(--font); transition: color 0.3s;
  }
  .confess-btn {
    background: var(--green); color: var(--white); border: none; padding: 16px;
    font-family: var(--font); font-size: clamp(20px, 5vw, 26px);
    border-radius: 4px; cursor: pointer; margin-top: 4px; transition: transform 0.1s;
  }
  .confess-btn:active { transform: scale(0.97); }

  /* ANIMATIONS */
  @keyframes fadeSlideIn { 0%{opacity:0;transform:translateY(20px) scale(0.97)} 100%{opacity:1;transform:translateY(0) scale(1)} }
  @keyframes fadeOut { 0%{opacity:1} 100%{opacity:0;transform:scale(0.85);filter:blur(4px)} }
  .unchosen-fade { animation: fadeOut 0.35s ease forwards; pointer-events: none; }
  .chosen-glow { background: rgba(45,106,45,0.25) !important; box-shadow: inset 0 0 40px rgba(45,106,45,0.3); transition: all 0.25s !important; }
  @keyframes consequencePulse { 0%{opacity:0;transform:scale(0.8)} 20%{opacity:1;transform:scale(1.05)} 80%{opacity:1;transform:scale(1)} 100%{opacity:0} }
  .consequence-pulse .consequence-text { animation: consequencePulse 1s ease forwards; }
</style>
</head>
<body>

<div id="float-layer"></div>
<button id="music-btn" onclick="toggleMusic()">♪ OFF</button>

<!-- INTRO -->
<div class="screen active" id="intro-screen">
  <div class="intro-title">Daily Sin<br>Confessional</div>
  <div class="intro-sub">A never-ending series<br>of bad decisions.</div>
  <button class="start-btn" onclick="startGame()">Confess now</button>
</div>

<!-- GAME -->
<div class="screen" id="game-screen">
  <div class="top-bar"></div>
  <div class="progress-dots" id="progress-dots"></div>
  <div class="q-area">
    <svg class="q-doodle" id="q-doodle" width="200" height="200" viewBox="0 0 200 200" fill="none"></svg>
    <div class="q-text" id="q-text"></div>
  </div>
  <div class="choices">
    <button class="choice-btn" id="left-btn" onclick="choose('left')"></button>
    <button class="choice-btn" id="right-btn" onclick="choose('right')"></button>
  </div>
</div>

<!-- CONSEQUENCE -->
<div class="screen" id="consequence-screen">
  <div class="consequence-text" id="consequence-text"></div>
</div>

<!-- COUNTER -->
<div class="screen" id="counter-screen">
  <div class="you-chose">you chose</div>
  <div class="chosen-label" id="chosen-label"></div>
  <div class="pct-wrap">
    <div class="pct-number" id="pct-number">63%</div>
    <div class="pct-label">of sinners made this choice</div>
  </div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">next →</button>
</div>

<!-- LEAD -->
<div class="screen" id="lead-screen">
  <div class="lead-title">You made it this far.</div>
  <div class="lead-sub">Clearly you have nothing better to do.</div>
  <div class="lead-form">
    <input class="lead-input" type="text" id="inp-name" placeholder="Name" />
    <input class="lead-input" type="tel" id="inp-phone" placeholder="Phone" />
    <input class="lead-input" type="email" id="inp-email" placeholder="Email" />
    <label class="consent-wrap">
      <input type="checkbox" id="consent-check" />
      <span class="consent-text">We're a startup trying to Make Ayurveda Sexy Again (MASA). Please agree to share your details for feedback, love, and unrequited love. We promise not to spam you. Mostly because we're too lazy.</span>
    </label>
    <button class="confess-btn" onclick="submitLead()">Keep confessing</button>
  </div>
</div>

<script>
// ── QUESTIONS — each has a fixed ID ──
const QUESTIONS_POOL = [
  { id:'Q01', pool:'GROUNDED',  text:"You've ordered Zomato.\nThen you remember you're supposed to go to the gym.", left:'Cancel the order', right:'Cancel the gym', pct:{left:21,right:79}, consequence:'your gym bag is judging you.', doodle:'food' },
  { id:'Q02', pool:'GROUNDED',  text:"It's your bhua's birthday.", left:'Call her', right:"React 👍 to your cousin's message in the family group", pct:{left:38,right:62}, consequence:'bhua has seen your story btw.', doodle:'phone' },
  { id:'Q00', pool:'GROUNDED',  text:'30 mins for lunch. Healthy salad arrives in 5 mins.\nBurger arrives in 10 mins.', left:'Salad', right:'Burger', pct:{left:19,right:81}, consequence:'your gut already knew.', doodle:'fork' },
  { id:'Q03', pool:'GROUNDED',  text:'Your annoying coworker is celebrating their birthday at a really good restaurant.', left:'Go for the food', right:'Skip it', pct:{left:61,right:39}, consequence:'the biryani was worth it.', doodle:'fork' },
  { id:'Q04', pool:'GROUNDED',  text:'Flat cola or very very bad coffee.', left:'Cola', right:'Coffee', pct:{left:48,right:52}, consequence:'both are crimes. you picked yours.', doodle:'squiggle' },
  { id:'Q05', pool:'GROUNDED',  text:'Chai in venti cup or coffee in cutting glass.', left:'Venti chai', right:'Cutting coffee', pct:{left:62,right:38}, consequence:'the wrong vessel changes everything.', doodle:'cup' },
  { id:'Q06', pool:'GROUNDED',  text:'Boring day at work.\nBeer on metro.', left:'Obviously', right:"I'm not an animal", pct:{left:57,right:43}, consequence:'respectfully, same.', doodle:'zigzag' },
  { id:'Q07', pool:'PRODUCT',   isProduct:true, text:'When you first saw the box, what did you think?', left:'I thought it was a cigarette pack', right:'I got the joke', pct:{left:54,right:46}, consequence:'the packaging team is sweating.', doodle:'star' },
  { id:'Q08', pool:'PRODUCT',   isProduct:true, text:'The candy.', left:'Dissolved too fast', right:'I liked it', pct:{left:43,right:57}, consequence:'noted. obsessively.', doodle:'star' },
  { id:'Q09', pool:'PRODUCT',   isProduct:true, text:'If this shows up on Blinkit for ₹150, do you buy it?', left:'Yes', right:'No', pct:{left:68,right:32}, consequence:'your wallet has spoken.', doodle:'star' },
  { id:'Q10', pool:'PRODUCT',   isProduct:true, text:'The peppermint was too strong.', left:'Yes', right:'No', pct:{left:71,right:29}, consequence:'your feedback has been confessed.', doodle:'star' },
  { id:'Q11', pool:'PRODUCT',   isProduct:true, text:'Did anyone ask you about the box?', left:'Yes', right:'No', pct:{left:44,right:56}, consequence:'word of mouth. the oldest sin.', doodle:'star' },
  { id:'Q12', pool:'ABSURD',    text:'Joey eats all your food or Chandler mocks you forever.', left:'Joey', right:'Chandler', pct:{left:83,right:17}, consequence:"could that BE any more obvious?", doodle:'fork' },
  { id:'Q13', pool:'ABSURD',    text:'Delete forever: the snooze button or the ability to feel smug about waking up early.', left:'Snooze', right:'Smugness', pct:{left:66,right:34}, consequence:"the snooze never stood a chance.", doodle:'zzz' },
];

const DOODLES = {
  food:`<path d="M60 80 Q75 55 90 80 Q105 105 120 80" stroke="#2D6A2D" stroke-width="3.5" stroke-linecap="round" fill="none"/><circle cx="150" cy="70" r="25" stroke="#2D6A2D" stroke-width="2.5" fill="none" stroke-dasharray="3 2.5"/>`,
  fork:`<path d="M95 30 L95 110 M83 30 L83 65 Q89 78 95 65 M107 30 L107 65 Q101 78 95 65" stroke="#2D6A2D" stroke-width="3" stroke-linecap="round" fill="none"/>`,
  star:`<path d="M100 35 L109 65 L140 65 L116 83 L125 113 L100 95 L75 113 L84 83 L60 65 L91 65 Z" stroke="#2D6A2D" stroke-width="2.5" stroke-linejoin="round" fill="none"/>`,
  squiggle:`<path d="M30 90 Q48 65 66 90 Q84 115 102 90 Q120 65 138 90 Q156 115 174 90" stroke="#2D6A2D" stroke-width="3.5" stroke-linecap="round" fill="none"/>`,
  zigzag:`<path d="M30 110 L60 60 L90 110 L120 60 L150 110 L180 60" stroke="#2D6A2D" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>`,
  phone:`<rect x="75" y="35" width="50" height="85" rx="8" stroke="#2D6A2D" stroke-width="2.5" fill="none"/><path d="M88 45 L112 45" stroke="#2D6A2D" stroke-width="2" stroke-linecap="round"/><circle cx="100" cy="108" r="5" stroke="#2D6A2D" stroke-width="2" fill="none"/>`,
  cup:`<path d="M65 48 L72 110 L128 110 L135 48 Z" stroke="#2D6A2D" stroke-width="2.5" stroke-linejoin="round" fill="none"/><path d="M135 68 Q155 68 155 88 Q155 108 135 108" stroke="#2D6A2D" stroke-width="2.5" stroke-linecap="round" fill="none"/><path d="M74 40 Q84 24 100 22 Q116 24 126 40" stroke="#2D6A2D" stroke-width="2" stroke-linecap="round" fill="none"/>`,
  zzz:`<text x="60" y="95" font-family="serif" font-size="40" fill="none" stroke="#2D6A2D" stroke-width="2">Z</text><text x="105" y="75" font-family="serif" font-size="28" fill="none" stroke="#2D6A2D" stroke-width="1.8">z</text><text x="138" y="58" font-family="serif" font-size="18" fill="none" stroke="#2D6A2D" stroke-width="1.5">z</text>`,
};

// FLOATING WORDS
const FLOAT_WORDS = ['Procrastination','Overthinking','Doomscrolling','Snacking','Binging','Ghosting','Flaking','Lurking','Stalking','Simping','Bragging','Flexing','Oversharing','Trolling','Complaining','Whining','Ranting','Judging','Comparing','Envying','FOMO','Craving','Indulging','Cheating','Lying','Excusing','Deflecting','Avoiding','Forgetting','Ignoring','Canceling','Delaying','Stalling','Multitasking','Overworking','Burnout','Addiction','Distraction','Temptation','Impulsing','Splurging','Hoarding','Scrolling','Streaming','Gaming','Napping','Slacking','Skipping','Relapsing','Gossiping','Mocking','Pretending','Posturing','Peacocking','Sabotaging','Daydreaming','Escaping','Regretting'];
(function(){
  const layer = document.getElementById('float-layer');
  FLOAT_WORDS.forEach(w => {
    const el = document.createElement('div');
    el.className = 'float-word';
    el.textContent = w;
    el.style.left = (4 + Math.random() * 88) + '%';
    el.style.fontSize = (13 + Math.random() * 13) + 'px';
    const dur = 14 + Math.random() * 22;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = -(Math.random() * dur) + 's';
    layer.appendChild(el);
  });
})();

// MUSIC
const audio = new Audio('https://raw.githubusercontent.com/thedailysin/masa-daily-sin/main/monument_music-dream-by-dreams-143531.mp3');
audio.loop = true; audio.volume = 0;
// Autoplay muted immediately — browser allows this
audio.play().catch(e => console.log('autoplay blocked:', e));
let musicOn = false;

function unlockMusic() {
  // Called on first user gesture — ramp volume up
  audio.volume = 0;
  audio.play().catch(()=>{});
  musicOn = true;
  const btn = document.getElementById('music-btn');
  btn.textContent = '♪ ON'; btn.classList.add('on');
  // Fade in over 1.5s
  let v = 0;
  const ramp = setInterval(() => {
    v = Math.min(v + 0.04, 0.6);
    audio.volume = v;
    if (v >= 0.6) clearInterval(ramp);
  }, 100);
}

function toggleMusic() {
  if (musicOn) {
    audio.pause(); musicOn = false;
    document.getElementById('music-btn').textContent = '♪ OFF';
    document.getElementById('music-btn').classList.remove('on');
  } else {
    audio.play().catch(e => console.log('play error:', e));
    musicOn = true;
    audio.volume = 0.6;
    document.getElementById('music-btn').textContent = '♪ ON';
    document.getElementById('music-btn').classList.add('on');
  }
}

// WEBHOOK
const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbz0LeqYK_BEFXb0WLul9gVyk5oWspym-gNA1_mHGRensZPco-sHQ0K0ZALkbjpRhEnR/exec';

// STATE
const LEAD_AT = 7;
let QUESTIONS = [], currentQ = 0, postLead = false;
const sessionId = Math.random().toString(36).slice(2,10).toUpperCase();
const sessionLog = []; // { qid, chose }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function startGame() {
  if (!musicOn) unlockMusic();
  const pinned = QUESTIONS_POOL.filter(q => ['Q01','Q02','Q00'].includes(q.id)).sort((a,b) => ['Q01','Q02','Q00'].indexOf(a.id) - ['Q01','Q02','Q00'].indexOf(b.id));
  const rest   = shuffle(QUESTIONS_POOL.filter(q => !['Q01','Q02','Q00'].includes(q.id)));
  QUESTIONS = [...pinned, ...rest];
  buildDots();
  showScreen('game-screen');
  loadQuestion();
}

function buildDots() {
  const c = document.getElementById('progress-dots'); c.innerHTML = '';
  QUESTIONS.forEach((q,i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (q.isProduct ? ' product' : '');
    d.id = `dot-${i}`; c.appendChild(d);
  }); updateDots();
}
function updateDots() {
  QUESTIONS.forEach((_,i) => {
    const d = document.getElementById(`dot-${i}`); if (!d) return;
    d.classList.remove('current','done');
    if (i < currentQ) d.classList.add('done');
    else if (i === currentQ) d.classList.add('current');
  });
}

function wrapChars(text) {
  return text.split('').map(ch => {
    if (ch === ' ') return ' ';
    if (ch === '\n') return '<br>';
    const dx = (Math.random()*4-2).toFixed(1)+'px';
    const dy = (Math.random()*4-2).toFixed(1)+'px';
    const dur = (2.5+Math.random()*3).toFixed(1)+'s';
    const delay = (Math.random()*2).toFixed(1)+'s';
    return `<span class="float-char" style="--cx:${dx};--cy:${dy};animation-duration:${dur};animation-delay:-${delay}">${ch}</span>`;
  }).join('');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function loadQuestion() {
  if (!postLead && currentQ === LEAD_AT) { showScreen('lead-screen'); return; }
  if (currentQ >= QUESTIONS.length) { showEndScreen(); return; }

  const q = QUESTIONS[currentQ];
  updateDots();

  const lb = document.getElementById('left-btn'), rb = document.getElementById('right-btn');
  lb.className = 'choice-btn'; rb.className = 'choice-btn';
  lb.style.cssText = ''; rb.style.cssText = '';
  lb.disabled = false; rb.disabled = false;

  const qText = document.getElementById('q-text');
  const prefix = q.isProduct ? '<span class="product-tag">PRODUCT CHECK</span>' : '';
  qText.innerHTML = prefix + wrapChars(q.text);
  lb.textContent = q.left;
  rb.textContent = q.right;
  document.getElementById('q-doodle').innerHTML = DOODLES[q.doodle] || DOODLES.squiggle;

  // re-trigger fade
  qText.style.animation = 'none'; void qText.offsetWidth;
  qText.style.animation = 'fadeSlideIn 0.5s ease both';
}

function choose(side) {
  const q = QUESTIONS[currentQ];
  sessionLog.push({ qid: q.id, chose: side });

  const lb = document.getElementById('left-btn'), rb = document.getElementById('right-btn');
  lb.disabled = true; rb.disabled = true;
  const chosen = side === 'left' ? lb : rb;
  const unchosen = side === 'left' ? rb : lb;
  chosen.classList.add('chosen-glow');
  unchosen.classList.add('unchosen-fade');
  setTimeout(() => showConsequence(q, side), 380);
}

function showConsequence(q, side) {
  const cs = document.getElementById('consequence-screen');
  document.getElementById('consequence-text').textContent = q.consequence || 'you chose this. own it.';
  cs.className = 'screen active consequence-pulse';
  setTimeout(() => cs.classList.remove('consequence-pulse'), 1100);
  setTimeout(() => showCounter(q, side), 1100);
}

function showCounter(q, side) {
  showScreen('counter-screen');
  const pct = side === 'left' ? q.pct.left : q.pct.right;
  const label = side === 'left' ? q.left : q.right;
  document.getElementById('chosen-label').textContent = label;
  const pctEl = document.getElementById('pct-number');
  const nextBtn = document.getElementById('next-btn');
  pctEl.classList.remove('revealed'); nextBtn.classList.remove('visible');
  pctEl.textContent = '0%';
  setTimeout(() => pctEl.classList.add('revealed'), 50);
  let cur = 0;
  const iv = setInterval(() => {
    cur = Math.min(cur + Math.ceil(pct/30), pct);
    pctEl.textContent = cur + '%';
    if (cur >= pct) clearInterval(iv);
  }, 35);
  setTimeout(() => nextBtn.classList.add('visible'), 1200);
}

function nextQuestion() {
  currentQ++;
  showScreen('game-screen');
  setTimeout(loadQuestion, 80);
}

function submitLead() {
  if (!document.getElementById('consent-check').checked) {
    document.querySelector('.consent-text').style.color = '#ff6b6b';
    setTimeout(() => document.querySelector('.consent-text').style.color = '', 1200);
    return;
  }
  const name  = document.getElementById('inp-name').value.trim();
  const phone = document.getElementById('inp-phone').value.trim();
  const email = document.getElementById('inp-email').value.trim();

  const payload = {
    session_id: sessionId,
    timestamp: new Date().toISOString(),
    name, phone, email,
    answers: sessionLog   // [{ qid:'Q01', chose:'left' }, ...]
  };

  fetch(WEBHOOK_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).catch(e => console.log('submit error:', e));

  postLead = true;
  showScreen('game-screen');
  loadQuestion();
}

function showEndScreen() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.body.insertAdjacentHTML('beforeend', `
    <div class="screen active" id="end-screen" style="gap:24px;padding:32px;text-align:center">
      <div style="font-family:'Permanent Marker',cursive;font-size:clamp(28px,7vw,40px);color:#3d8f3d">confession received.</div>
      <div style="font-family:'Permanent Marker',cursive;font-size:clamp(14px,3.5vw,18px);color:rgba(255,255,255,0.4)">we'll be in touch.<br>go touch grass.</div>
      <button class="start-btn" style="font-size:clamp(16px,4vw,22px);padding:14px 36px" onclick="location.reload()">confess again</button>
    </div>`);
}
</script>
</body>
</html>
